<svg xmlns="http://www.w3.org/2000/svg" width="800" height="80">
  <style>
    text {
      font-family: 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 35px;
      font-weight: bold;
      fill: #58a6ff;
    }
    .cursor {
      fill: #58a6ff;
      animation: blink 1s step-end infinite;
    }
    .cursor-typing {
      animation: blink-type 1.5s step-end forwards;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes blink-type { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <g transform="translate(170, 50)">
    <g clip-path="url(#typewriter)">
      <text x="0" y="0">Hi 👋, I'm Ashish Pal</text>
    </g>
    
    <rect x="0" y="-28" width="20" height="35" fill="#58a6ff" class="cursor-typing">
      <animate attributeName="x" from="0" to="470" dur="1.5s" begin="0.3s" fill="freeze" />
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="1.8s" fill="freeze" />
    </rect>
    
    <text x="470" y="0" class="cursor" opacity="0">
      _
      <animate attributeName="opacity" values="0;1" dur="0.1s" begin="1.8s" fill="freeze" />
    </text>
  </g>
  <defs>
    <clipPath id="typewriter">
      <rect x="0" y="-40" width="0" height="50">
        <animate attributeName="width" from="0" to="470" dur="1.5s" begin="0.3s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
</svg>
