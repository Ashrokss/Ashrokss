<svg xmlns="http://www.w3.org/2000/svg" width="800" height="80">
  <style>
    text {
      font-family: 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 35px;
      font-weight: bold;
      fill: #7ee787;
    }
    .cursor {
      fill: #7ee787;
      opacity: 0;
      animation: blink 1s step-end infinite;
      animation-delay: 1.8s;
    }
    .cursor-typing {
      animation: blink 0.6s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <g transform="translate(170, 50)">
    <g clip-path="url(#typewriter)">
      <text x="0" y="0">Hi 👋, I'm Ashish Pal</text>
    </g>
    
    <rect x="0" y="-28" width="12" height="35" fill="#7ee787" class="cursor-typing">
      <animate attributeName="x" from="0" to="470" dur="1.5s" begin="0.3s" fill="freeze" />
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="1.8s" fill="freeze" />
    </rect>
    
    <rect x="470" y="-28" width="12" height="35" fill="#7ee787" class="cursor"></rect>
  </g>
  <defs>
    <clipPath id="typewriter">
      <rect x="0" y="-40" width="0" height="50">
        <animate attributeName="width" from="0" to="470" dur="1.5s" begin="0.3s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
</svg>
