<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340">
  <style>
    .bg { fill: #0d1117; rx: 8; ry: 8; stroke: #30363d; stroke-width: 1; }
    .text {
      font-family: 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 14px;
      fill: #c9d1d9;
    }
    .prompt { fill: #7ee787; font-weight: bold; }
    .dir { fill: #79c0ff; font-weight: bold; }
    
    .cursor-typing {
      animation: blink-type 1.5s step-end infinite;
    }
    .cursor-blink {
      fill: #c9d1d9;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes blink-type { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <rect width="100%" height="100%" class="bg" />
  
  <circle cx="20" cy="20" r="6" fill="#ff5f56" />
  <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="20" r="6" fill="#27c93f" />
  
  <g class="text" transform="translate(20, 55)">
    <!-- First command -->
    <text y="0">
      <tspan class="prompt">ashish@ubuntu</tspan>:<tspan class="dir">~/about-me$</tspan>
    </text>
    
    <g clip-path="url(#typewriter)">
      <text y="0" x="225">cat profile.txt</text>
    </g>
    
    <!-- Moving cursor for typing effect -->
    <rect x="225" y="-12" width="8" height="15" fill="#c9d1d9" class="cursor-typing">
      <animate attributeName="x" values="225; 225; 355; 355" keyTimes="0; 0.05; 0.25; 1" dur="6s" repeatCount="2" fill="freeze" />
      <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.266; 0.267; 1" dur="6s" repeatCount="2" fill="freeze" />
    </rect>
    
    <!-- Output lines -->
    <text y="40" opacity="0">🌱 Currently learning:
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.299; 0.3; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    <text y="60" opacity="0">   DevOps practices, CI/CD pipelines, IaC (Terraform/OpenTofu), Azure cloud architecture.
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.332; 0.333; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    
    <text y="100" opacity="0">👨‍💻 Portfolio:
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.399; 0.40; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    <text y="120" opacity="0">   https://ash-21.netlify.app/
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.432; 0.433; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    
    <text y="160" opacity="0">💬 Ask me about:
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.499; 0.50; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    <text y="180" opacity="0">   DevOps, CI/CD, Azure, Terraform, OpenTofu
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.532; 0.533; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    
    <text y="220" opacity="0">📫 Reach me at:
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.599; 0.60; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    <text y="240" opacity="0">   ashish200221@gmail.com
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.632; 0.633; 1" dur="6s" repeatCount="2" fill="freeze" />
    </text>
    
    <!-- Final command line with blinking cursor -->
    <g opacity="0">
      <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.749; 0.75; 1" dur="6s" repeatCount="2" fill="freeze" />
      <text y="280">
        <tspan class="prompt">ashish@ubuntu</tspan>:<tspan class="dir">~/about-me$</tspan>
      </text>
      <!-- Blinking cursor -->
      <rect x="225" y="268" width="8" height="15" class="cursor-blink" />
    </g>
  </g>
  
  <defs>
    <clipPath id="typewriter">
      <rect x="225" y="-15" width="0" height="20">
        <animate attributeName="width" values="0; 0; 140; 140" keyTimes="0; 0.05; 0.25; 1" dur="6s" repeatCount="2" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
</svg>
