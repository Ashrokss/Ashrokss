<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340">
  <style>
    .bg { fill: #0d1117; rx: 8; ry: 8; stroke: #30363d; stroke-width: 1; }
    .text {
      font-family: 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 14px;
      fill: #c9d1d9;
    }
    .prompt { fill: #7ee787; font-weight: bold; }
    .dir { fill: #79c0ff; font-weight: bold; }
    
    /* Reveal lines sequentially */
    .l1, .l2, .l3, .l4, .l5, .l6, .l7, .l8, .final { opacity: 0; animation: reveal 0.1s forwards; }
    
    .l1 { animation-delay: 1.8s; }
    .l2 { animation-delay: 2.0s; }
    .l3 { animation-delay: 2.4s; }
    .l4 { animation-delay: 2.6s; }
    .l5 { animation-delay: 3.0s; }
    .l6 { animation-delay: 3.2s; }
    .l7 { animation-delay: 3.6s; }
    .l8 { animation-delay: 3.8s; }
    .final { animation-delay: 4.5s; }
    
    @keyframes reveal { to { opacity: 1; } }
    
    /* Cursor blinking */
    .cursor {
      display: inline-block;
      fill: #c9d1d9;
      animation: blink 1s step-end infinite;
    }
    .cursor-typing {
      animation: blink-type 1.5s step-end forwards;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes blink-type { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <rect width="100%" height="100%" class="bg" />
  
  <!-- Mac window dots -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56" />
  <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="20" r="6" fill="#27c93f" />
  
  <g class="text" transform="translate(20, 55)">
    <!-- First command -->
    <text y="0">
      <tspan class="prompt">ashish@ubuntu</tspan>:<tspan class="dir">~/about-me$</tspan>
    </text>
    
    <g clip-path="url(#typewriter)">
      <text y="0" x="225">cat profile.txt</text>
    </g>
    
    <!-- Moving cursor for typing effect -->
    <rect x="225" y="-12" width="8" height="15" fill="#c9d1d9" class="cursor-typing">
      <animate attributeName="x" from="225" to="355" dur="1.2s" begin="0.3s" fill="freeze" calcMode="discrete" />
      <animate attributeName="opacity" values="1;0" dur="0.1s" begin="1.6s" fill="freeze" />
    </rect>
    
    <!-- Output lines -->
    <text y="40" class="l1">🌱 Currently learning:</text>
    <text y="60" class="l2">   DevOps practices, CI/CD pipelines, IaC (Terraform/OpenTofu), Azure cloud architecture.</text>
    
    <text y="100" class="l3">👨‍💻 Portfolio:</text>
    <text y="120" class="l4">   https://ash-21.netlify.app/</text>
    
    <text y="160" class="l5">💬 Ask me about:</text>
    <text y="180" class="l6">   DevOps, CI/CD, Azure, Terraform, OpenTofu</text>
    
    <text y="220" class="l7">📫 Reach me at:</text>
    <text y="240" class="l8">   ashish200221@gmail.com</text>
    
    <!-- Final command line with blinking cursor -->
    <g class="final">
      <text y="280">
        <tspan class="prompt">ashish@ubuntu</tspan>:<tspan class="dir">~/about-me$</tspan> <tspan class="cursor">█</tspan>
      </text>
    </g>
  </g>
  
  <defs>
    <clipPath id="typewriter">
      <rect x="225" y="-15" width="0" height="20">
        <animate attributeName="width" from="0" to="140" dur="1.2s" begin="0.3s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>
</svg>
